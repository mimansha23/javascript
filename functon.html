// Key Points:

// Defined using function*
// Uses yield to return values one at a time
// Returns a Generator object
// Execution pauses at each yield and resumes with next()

// Definition:
// A generator function is a special JavaScript function that produces a sequence of values on demand, pausing and resuming its execution using the yield keyword.

function* generateFunc(){
    yield 1;
    yield 2;
    return 3;

}
let generator = generateFunc();
let one = generator.next();
let two = generator.next();
let three = generator.next();


alert(JSON.stringify(one));
alert(JSON.stringify(two));
alert(JSON.stringify(three));
//{value":1,"done":false}
