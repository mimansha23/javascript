<script>
    //for loops
let x;
for(x=0;x<5; x++)
console.log(x)

<h1>while loop</h1>
<script>
   //while loop
    let x2=1;
    while(x2<=6){
        console.log(x2)
        x2++
    }

</script>
<h1>java script do while loop</h1>
<script>
    let z=5;
    do{
console.log(z)
z++
    }
    while(z<10)
</script>
