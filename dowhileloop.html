<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <p>breaking loop</p>
    <script>
        let x;
        for(x=1; x<=10; x++){
            console.log(x)
            if(x==5)
            break
        }
    </script>
</body>
</html>
#so now we get the output from 1 to 5
